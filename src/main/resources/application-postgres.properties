spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mediconnect}
spring.datasource.username=${DB_USERNAME:mediconnect}
spring.datasource.password=${DB_PASSWORD:mediconnect}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Use UTC timezone
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Production-ready datasource settings (connection pool)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
