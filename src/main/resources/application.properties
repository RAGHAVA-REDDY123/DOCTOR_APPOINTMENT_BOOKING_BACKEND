spring.application.name=MediConnect

spring.datasource.url=jdbc:h2:mem:mediconnectdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=raghu

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Ensure Hibernate creates schema before running SQL data scripts
spring.jpa.defer-datasource-initialization=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.open-in-view=false
spring.jackson.serialization.write-dates-as-timestamps=false

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=60000
spring.cache.type=simple
spring.cache.redis.time-to-live=3600000
spring.cache.redis.key-prefix=mediconnect:

jwt.secret=${JWT_SECRET:change-me-in-productions}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

server.port=${PORT:8082}

